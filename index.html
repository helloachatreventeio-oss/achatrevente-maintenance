<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>achatrevente.io</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0d;
      color: #e8e4dc;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      font-family: 'Instrument Serif', serif;
      font-size: 1rem;
      letter-spacing: 0.02em;
      color: #6b6860;
      margin-bottom: 80px;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      text-align: center;
      margin-bottom: 32px;
      color: #e8e4dc;
    }

    h1 em { font-style: italic; color: #a09880; }

    p {
      font-size: 0.9rem;
      color: #6b6860;
      text-align: center;
      line-height: 1.8;
      max-width: 320px;
      margin-bottom: 56px;
    }

    a.cta {
      display: inline-block;
      border: 1px solid #3a3830;
      color: #e8e4dc;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 32px;
      transition: border-color 0.2s;
      margin-bottom: 80px;
    }

    a.cta:hover { border-color: #e8e4dc; }

    .contact {
      font-size: 0.72rem;
      color: #4a4840;
    }

    .contact a {
      color: #6b6860;
      text-decoration: none;
    }

    .contact a:hover { color: #e8e4dc; }
  </style>
</head>
<body>

  <div class="logo">achatrevente.io</div>

  <h1>Réservé aux<br />membres <em>DV.</em></h1>

  <p>Cette plateforme est exclusivement accessible aux membres DV Immobilier.</p>

  <a class="cta" href="https://www.dvimmobilier.fr/liste-attente-mdb" target="_blank" rel="noopener">
    Rejoindre la liste d'attente
  </a>

  <div class="contact">Une question ? <a href="mailto:contact@achatrevente.io">contact@achatrevente.io</a></div>

</body>
</html>
